name: subhasankalpam
description: SubhaSankalpam - AI-Powered Telugu Matrimony Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Navigation
  go_router: ^14.2.7
  # Networking
  dio: ^5.7.0
  # Local Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  # Forms
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.1.0
  # Chat
  web_socket_channel: ^3.0.1
  # Image
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  # Utils
  intl: any
  url_launcher: ^6.3.0
  # Notifications
  firebase_messaging: ^15.1.3
  firebase_core: ^3.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.12

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
